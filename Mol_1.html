<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PyMOL-style 3D — UNK:A:900</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://3dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body {
  height:100%; overflow:hidden;
  font-family:'Segoe UI',Arial,sans-serif;
  background:
    radial-gradient(ellipse at 12% 18%, rgba(90,0,220,0.55) 0%, transparent 44%),
    radial-gradient(ellipse at 85% 12%, rgba(0,100,240,0.45) 0%, transparent 45%),
    radial-gradient(ellipse at 55% 90%, rgba(0,180,160,0.28) 0%, transparent 40%),
    radial-gradient(ellipse at 76% 56%, rgba(140,0,210,0.32) 0%, transparent 38%),
    linear-gradient(160deg, #020c1e 0%, #040a18 50%, #020810 100%);
  color:#e4efff;
}
body { display:flex; flex-direction:column; }

/* ── toolbar ── */
#toolbar {
  flex-shrink:0;
  display:flex; flex-wrap:wrap; align-items:center; gap:5px;
  padding:6px 12px;
  background: linear-gradient(180deg, rgba(12,28,72,0.82) 0%, rgba(6,16,48,0.88) 100%);
  backdrop-filter: blur(44px) saturate(2.5) brightness(1.14);
  -webkit-backdrop-filter: blur(44px) saturate(2.5) brightness(1.14);
  border-bottom: 1px solid rgba(140,180,255,0.34);
  box-shadow: 0 4px 44px rgba(40,80,255,0.32), 0 0 90px rgba(100,0,255,0.12), inset 0 1px 0 rgba(210,225,255,0.11);
  z-index:20;
}
@keyframes shimmer {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.tb-title {
  font-weight:800; font-size:13px; white-space:nowrap; margin-right:4px;
  background: linear-gradient(90deg, #00eeff, #cc44ff, #ff44cc, #ffaa00, #00eeff);
  background-size: 300% 100%;
  animation: shimmer 6s ease infinite;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter: drop-shadow(0 0 12px rgba(160,100,255,0.80));
}
#toolbar label {
  display:inline-flex; align-items:center; gap:4px; cursor:pointer;
  font-size:11.5px; color:#c2d8f8; padding:2px 8px;
  border:1px solid rgba(100,160,255,0.32); border-radius:6px;
  background: linear-gradient(135deg, rgba(25,58,130,0.44) 0%, rgba(12,30,85,0.50) 100%);
  backdrop-filter: blur(16px) saturate(1.8);
  user-select:none; transition:all 0.18s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}
#toolbar label:hover {
  background: linear-gradient(135deg, rgba(52,114,234,0.60) 0%, rgba(28,72,195,0.68) 100%);
  border-color: rgba(110,218,255,0.75);
  color:#fff;
  box-shadow: 0 0 18px rgba(60,190,255,0.55), inset 0 1px 0 rgba(255,255,255,0.16);
}
#toolbar input[type=checkbox] { width:12px; height:12px; cursor:pointer; accent-color:#44ddff; }
.sw { display:inline-block; width:10px; height:10px; border-radius:2px; border:1px solid rgba(255,255,255,0.3); flex-shrink:0; filter:brightness(1.3) saturate(1.5); }
.sep { width:1px; background:linear-gradient(180deg, transparent, rgba(150,195,255,0.48), transparent); align-self:stretch; margin:0 2px; }
/* full-width separator that forces a toolbar row break */
.tb-row-break { flex-basis:100%; height:1px; background:linear-gradient(90deg, transparent, rgba(120,180,255,0.30), rgba(200,100,255,0.24), transparent); margin:2px 0; }
.tb-row-label  {
  font-size:10.5px; font-weight:800; text-transform:uppercase;
  letter-spacing:0.06em; white-space:nowrap;
  background: linear-gradient(90deg,#44ddff,#cc55ff,#ff55cc);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter: drop-shadow(0 0 5px rgba(160,80,255,0.55));
}
.tb-btn {
  padding:3px 10px; cursor:pointer;
  background: linear-gradient(135deg, rgba(22,65,155,0.58) 0%, rgba(12,38,114,0.65) 100%);
  backdrop-filter: blur(16px) saturate(1.8);
  color:#c8e2ff;
  border:1px solid rgba(100,168,255,0.42); border-radius:6px;
  font-size:11.5px; transition:all 0.18s;
  box-shadow: 0 2px 14px rgba(0,80,200,0.24), inset 0 1px 0 rgba(255,255,255,0.09);
}
.tb-btn:hover {
  background: linear-gradient(135deg, rgba(52,135,245,0.75) 0%, rgba(28,92,215,0.82) 100%);
  border-color: rgba(110,222,255,0.85);
  color:#fff;
  box-shadow: 0 0 22px rgba(60,200,255,0.70), inset 0 1px 0 rgba(255,255,255,0.20);
}

/* ── main area ── */
#main-area { flex:1; display:flex; min-height:0; }
#viewer-wrap { flex:1; position:relative; }
#viewer { position:absolute; inset:0; }
#viewer-wrap canvas:not(#select-overlay) {
  filter: saturate(1.55) brightness(1.12) contrast(1.08);
}

/* ── selection overlay ── */
#select-overlay {
  position:absolute; inset:0; z-index:15;
  pointer-events:none; cursor:default;
}
#select-overlay.active { pointer-events:all; cursor:crosshair; }
.sel-hint {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  background:rgba(0,10,30,0.80);
  backdrop-filter:blur(10px);
  color:#44ddff; font-size:12px; padding:5px 14px;
  border:1px solid rgba(60,180,255,0.35);
  border-radius:8px; pointer-events:none; z-index:16; white-space:nowrap;
  display:none;
}

/* ── sidebar ── */
#sidebar {
  width:286px; flex-shrink:0;
  background: linear-gradient(180deg, rgba(5,14,42,0.80) 0%, rgba(3,9,30,0.86) 100%);
  backdrop-filter: blur(48px) saturate(2.3) brightness(1.07);
  -webkit-backdrop-filter: blur(48px) saturate(2.3) brightness(1.07);
  border-left:1px solid rgba(110,165,255,0.26);
  box-shadow: -6px 0 52px rgba(0,60,200,0.24);
  display:flex; flex-direction:column; overflow:hidden;
}
.sb-section { padding:10px 12px; border-bottom:1px solid rgba(100,160,255,0.18); }
.sb-section h4 {
  font-size:10px; font-weight:800; margin-bottom:7px;
  text-transform:uppercase; letter-spacing:0.08em;
  background: linear-gradient(90deg,#44ddff,#cc55ff,#ff55cc);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter: drop-shadow(0 0 4px rgba(160,80,255,0.50));
}
.legend-row  { display:flex; align-items:center; gap:6px; padding:2px 0; font-size:11.5px; }
.ldot        { width:11px; height:11px; border-radius:50%; flex-shrink:0; box-shadow:0 0 8px currentColor, 0 0 20px currentColor; }
.inter-list  { overflow-y:auto; flex:1; padding:9px 11px; font-size:11px; }
/* Custom glassy scrollbar */
.inter-list::-webkit-scrollbar { width:5px; }
.inter-list::-webkit-scrollbar-track { background:rgba(255,255,255,0.04); border-radius:3px; }
.inter-list::-webkit-scrollbar-thumb { background:linear-gradient(180deg, rgba(100,180,255,0.52), rgba(160,80,255,0.52)); border-radius:3px; }
.inter-list::-webkit-scrollbar-thumb:hover { background:linear-gradient(180deg, rgba(110,225,255,0.80), rgba(200,80,255,0.80)); }
.icard {
  background: linear-gradient(135deg, rgba(28,62,148,0.52) 0%, rgba(10,30,90,0.46) 100%);
  border:1px solid rgba(100,178,255,0.30);
  border-radius:10px;
  padding:7px 9px; margin-bottom:6px;
  backdrop-filter: blur(18px) saturate(1.8);
  box-shadow: 0 4px 22px rgba(0,80,200,0.26), inset 0 1px 0 rgba(220,235,255,0.11);
  transition: all 0.20s;
}
.icard:hover {
  box-shadow: 0 6px 32px rgba(0,175,255,0.42), 0 0 0 1px rgba(110,235,255,0.32), inset 0 1px 0 rgba(255,255,255,0.16);
  border-color: rgba(110,235,255,0.55);
  background: linear-gradient(135deg, rgba(38,80,182,0.60) 0%, rgba(15,46,122,0.58) 100%);
  transform: translateY(-1px);
}
.icard-type {
  font-size:10px; font-weight:800; padding:2px 7px; border-radius:4px;
  display:inline-block; margin-bottom:3px;
  box-shadow: 0 0 14px rgba(255,255,255,0.30), 0 2px 6px rgba(0,0,0,0.55);
  text-shadow: 0 0 8px rgba(0,0,0,0.75);
  letter-spacing:0.03em;
}
.icard-res  { color:#77d4ff; font-weight:700; font-size:11.5px; }
.icard-dist { color:#88aacc; font-size:10px; margin-top:2px; }
</style>
</head>
<body>

<!-- ── Toolbar (2 rows) ── -->
<div id="toolbar">
  <!-- Row 1: structure toggles -->
  <span class="tb-title">3D PLIP — UNK:A:900</span>
  <span class="sep"></span>
  <label><input type="checkbox" id="cb_cartoon" checked onchange="redraw()"><span>Protein Cartoon</span></label>
  <label><input type="checkbox" id="cb_surface" onchange="redraw()"><span>Protein Surface</span></label>
  <label style="display:flex;align-items:center;gap:5px;">
    <span style="font-size:11px;color:rgba(180,210,255,0.85);">Opacity</span>
    <input type="range" id="sl_protein_opacity" min="0" max="100" value="60"
      style="width:80px;accent-color:#7ec8ff;cursor:pointer;"
      oninput="document.getElementById('lbl_protein_opacity').textContent=this.value+'%';redraw()">
    <span id="lbl_protein_opacity" style="font-size:11px;color:rgba(180,210,255,0.85);min-width:32px;">60%</span>
  </label>
  <label><input type="checkbox" id="cb_ligand" checked onchange="redraw()"><span class="sw" style="background:#39FF14;"></span>Ligand</label>
  <label><input type="checkbox" id="cb_interacting" checked onchange="redraw()"><span class="sw" style="background:#C8C8C8;"></span>Interacting Residues</label>
  <label><input type="checkbox" id="cb_nearby" checked onchange="redraw()"><span class="sw" style="background:#00CCCC;"></span>Nearby Residues (5 Å)</label>
  <span class="sep"></span>
  <label><input type="checkbox" id="cb_labels" checked onchange="redraw()"><span>Labels</span></label>
  <span class="sep"></span>
  <button class="tb-btn" onclick="resetView()">Reset View</button>
  <button class="tb-btn" onclick="toggleBG()">Toggle BG</button>
  <span class="sep"></span>
  <button id="btn-select" class="tb-btn" onclick="toggleSelectMode()" title="Drag to select crop area">&#9638; Select Area</button>
  <button id="btn-dl-sel" class="tb-btn" onclick="downloadSelection()" disabled
    style="background:rgba(0,100,60,0.35);border-color:rgba(0,220,100,0.30);opacity:0.5;"
    title="Download the selected region (transparent background)">&#8681; Download Selection</button>
  <button class="tb-btn" onclick="downloadPNG()" style="background:rgba(10,60,140,0.50);border-color:rgba(60,160,255,0.45);"
    title="Download full view (transparent background)">&#8681; Download Full</button>
  <!-- Row 2: per-interaction-type checkboxes -->
  <div class="tb-row-break"></div>
  <span class="tb-row-label">Interactions:</span>
  <label><input type="checkbox" id="cb_hbond" checked onchange="redraw()"><span class="sw" style="background:#FFD700;"></span>H-Bond</label>
  <label><input type="checkbox" id="cb_hydrophobic" checked onchange="redraw()"><span class="sw" style="background:#39FF14;"></span>Hydrophobic</label>
  <label><input type="checkbox" id="cb_pication" checked onchange="redraw()"><span class="sw" style="background:#800080;"></span>Pi-Cation</label>
  <label><input type="checkbox" id="cb_saltbridge" checked onchange="redraw()"><span class="sw" style="background:#FF69B4;"></span>Salt Bridge</label>
  
</div>

<!-- ── Main area ── -->
<div id="main-area">
  <div id="viewer-wrap">
    <div id="viewer"></div>
    <!-- drag-to-crop overlay -->
    <canvas id="select-overlay"></canvas>
    <div class="sel-hint" id="sel-hint">Drag to select crop area &mdash; release to confirm</div>
  </div>

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sb-section">
      <h4>Colour Key</h4>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
        <div class="legend-row"><div class="ldot" style="background:#39FF14;border-radius:3px;box-shadow:0 0 7px #39FF14;"></div><span>Ligand</span></div>
        <div class="legend-row"><div class="ldot" style="background:#C8C8C8;border-radius:3px;box-shadow:0 0 5px #C8C8C8;"></div><span>Interacting</span></div>
        <div class="legend-row"><div class="ldot" style="background:#00CCCC;border-radius:3px;box-shadow:0 0 5px #00CCCC;"></div><span>Nearby (5Å)</span></div>
      </div>
      <h4 style="margin-top:6px;">Interaction Types</h4>
      <div id="legend"></div>
    </div>
    <div class="sb-section">
      <h4>Summary</h4>
      <div id="summary"></div>
    </div>
    <div style="padding:7px 12px;border-bottom:1px solid rgba(80,140,220,0.18);font-size:10px;
                font-weight:800;text-transform:uppercase;letter-spacing:0.08em;
                background:linear-gradient(90deg,#44ddff,#aa66ff);
                -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
      Interaction Details
    </div>
    <div class="inter-list" id="ilist"></div>
  </div>
</div>

// ── selection overlay helpers ────────────────────────────────────────────
function getOverlay() { return document.getElementById('select-overlay'); }
function getGLCanvas() {
  return document.querySelector('#viewer-wrap canvas:not(#select-overlay)');
}

function syncOverlay() {
  var wrap = document.getElementById('viewer-wrap');
  var ov   = getOverlay();
  ov.width  = wrap.clientWidth;
  ov.height = wrap.clientHeight;
  ov.style.width  = wrap.clientWidth  + 'px';
  ov.style.height = wrap.clientHeight + 'px';
}

function drawOverlay() {
  var ov  = getOverlay();
  var ctx = ov.getContext('2d');
  ctx.clearRect(0, 0, ov.width, ov.height);
  if (!selStart || !selCurrent) return;
  var x = Math.min(selStart.x, selCurrent.x);
  var y = Math.min(selStart.y, selCurrent.y);
  var w = Math.abs(selCurrent.x - selStart.x);
  var h = Math.abs(selCurrent.y - selStart.y);
  // Dim outside
  ctx.fillStyle = 'rgba(0,0,0,0.40)';
  ctx.fillRect(0, 0, ov.width, ov.height);
  ctx.clearRect(x, y, w, h);
  // Selection border
  ctx.strokeStyle = '#00eeff';
  ctx.lineWidth   = 2;
  ctx.setLineDash([6, 3]);
  ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
  // Size label
  var gl = getGLCanvas();
  if (gl) {
    var sx = Math.round(w * gl.width  / ov.width);
    var sy = Math.round(h * gl.height / ov.height);
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    var txt = sx + ' × ' + sy + ' px';
    ctx.font = '11px Arial';
    var tw = ctx.measureText(txt).width;
    ctx.fillRect(x + 4, y + 4, tw + 10, 18);
    ctx.fillStyle = '#00eeff';
    ctx.fillText(txt, x + 9, y + 16);
  }
}

function toggleSelectMode() {
  selectMode = !selectMode;
  var ov  = getOverlay();
  var btn = document.getElementById('btn-select');
  var hint = document.getElementById('sel-hint');
  if (selectMode) {
    syncOverlay();
    ov.classList.add('active');
    btn.textContent = '× Cancel Select';
    btn.style.background = '#4a1a2a';
    hint.id = 'sel-hint-active';
    hint.style.display = 'block';
  } else {
    ov.classList.remove('active');
    btn.textContent = '☸ Select Area';
    btn.style.background = '';
    hint.style.display = 'none';
    hint.id = 'sel-hint';
    selStart = selCurrent = null;
    drawOverlay();   // clears overlay
  }
}

function initSelectOverlay() {
  var ov = getOverlay();
  syncOverlay();

  ov.addEventListener('mousedown', function(e) {
    if (!selectMode) return;
    var r = ov.getBoundingClientRect();
    selStart   = {x: e.clientX - r.left, y: e.clientY - r.top};
    selCurrent = {x: selStart.x, y: selStart.y};
    selRect    = null;
    var dlBtn = document.getElementById('btn-dl-sel');
    dlBtn.disabled = true;
    dlBtn.style.opacity = '0.5';
    drawOverlay();
  });

  ov.addEventListener('mousemove', function(e) {
    if (!selectMode || !selStart) return;
    var r = ov.getBoundingClientRect();
    selCurrent = {x: e.clientX - r.left, y: e.clientY - r.top};
    drawOverlay();
  });

  ov.addEventListener('mouseup', function(e) {
    if (!selectMode || !selStart) return;
    var r  = ov.getBoundingClientRect();
    selCurrent = {x: e.clientX - r.left, y: e.clientY - r.top};
    drawOverlay();

    var cssx = Math.min(selStart.x, selCurrent.x);
    var cssy = Math.min(selStart.y, selCurrent.y);
    var cssw = Math.abs(selCurrent.x - selStart.x);
    var cssh = Math.abs(selCurrent.y - selStart.y);

    if (cssw > 15 && cssh > 15) {
      var gl   = getGLCanvas();
      var ratX = gl ? gl.width  / ov.width  : 1;
      var ratY = gl ? gl.height / ov.height : 1;
      selRect = {
        x: Math.round(cssx * ratX), y: Math.round(cssy * ratY),
        w: Math.round(cssw * ratX), h: Math.round(cssh * ratY),
      };
      var dlBtn = document.getElementById('btn-dl-sel');
      dlBtn.disabled = false;
      dlBtn.style.opacity = '1';
    }
    selStart = null;
  });

  // Keep overlay sized to viewer on window resize
  window.addEventListener('resize', function() {
    syncOverlay();
    if (selectMode) drawOverlay();
  });
}

// ── init ─────────────────────────────────────────────────────────────────────
function initViewer() {
  viewer = $3Dmol.createViewer('viewer', {
    backgroundColor: 'white',
    antialias:       true,
    cartoonQuality:  10,
    alpha:           true,
  });
  viewer.addModel(PDB, 'pdb');   // model 0 — full structure
  if (LIG_SDF) {
    ligModel    = viewer.addModel(LIG_SDF, 'sdf');  // model obj — ligand with bond orders
    ligModelIdx = 1;
  }
  // Load per-residue SDF models (bond-order aware — gives double bonds in aromatic rings)
  Object.keys(RES_SDFS).forEach(function(key) {
    if (RES_SDFS[key]) {
      resModels[key] = viewer.addModel(RES_SDFS[key], 'sdf');
    }
  });
  redraw();
  viewer.zoomTo({resn: LIGAND.resn, chain: LIGAND.chain, resi: LIGAND.resi});
  viewer.zoom(0.78);
  viewer.render();
  buildSidebar();
  initSelectOverlay();
}

// ── helpers ───────────────────────────────────────────────────────────────────
function g(id) {
  var el = document.getElementById(id);
  return el ? el.checked : false;
}

function getEnabledTypes() {
  var en = {};
  ACTIVE_TYPES.forEach(function(t) { en[t] = g('cb_' + t); });
  return en;
}

// ── full redraw from checkbox state ──────────────────────────────────────────
function redraw() {
  if (!viewer) return;

  var showCartoon = g('cb_cartoon');
  var showSurface = g('cb_surface');
  var protOpacity  = parseFloat(document.getElementById('sl_protein_opacity').value) / 100;
  var showLigand  = g('cb_ligand');
  var showInter   = g('cb_interacting');
  var showNearby  = g('cb_nearby');
  var showLabels  = g('cb_labels');
  var enabledT    = getEnabledTypes();

  // Interacting residues visible only when they have ≥1 enabled interaction type
  var visInter = INTERACTING.filter(function(r) {
    return showInter && r.itypes.some(function(t) { return enabledT[t]; });
  });

  // ── Styles ───────────────────────────────────────────────────────────────
  viewer.setStyle({}, {});   // clear all

  // Protein cartoon (whole chain, ATOM only)
  if (showCartoon) {
    viewer.setStyle(
      {hetflag: false},
      {cartoon: {color: 'white', opacity: protOpacity, thickness: 0.6}}
    );
  }

  // Nearby residues — blue carbons, thin sticks
  // Drawn first so interacting residues (gray) win when they overlap
  if (showNearby) {
    NEARBY.forEach(function(r) {
      var key = r.resn + ':' + r.chain + ':' + r.resi;
      if (resModels[key]) {
        resModels[key].setStyle({}, {
          stick: {colorscheme: NEAR_CS, radius: 0.12, multipleBondScale: 0.35, singleBonds: false},
        });
      } else {
        var s = {};
        if (showCartoon) s.cartoon = {color: 'white', opacity: protOpacity, thickness: 0.6};
        s.stick = {colorscheme: NEAR_CS, radius: 0.12, multipleBondScale: 0.35, singleBonds: false};
        viewer.setStyle({chain: r.chain, resi: r.resi, hetflag: false}, s);
      }
    });
  }

  // Interacting residues — gray carbons (INT_CS)
  visInter.forEach(function(r) {
    var key = r.resn + ':' + r.chain + ':' + r.resi;
    if (resModels[key]) {
      resModels[key].setStyle({}, {
        stick: {colorscheme: INT_CS, radius: 0.18, multipleBondScale: 0.30, singleBonds: false},
      });
    } else {
      var s = {};
      if (showCartoon) s.cartoon = {color: 'white', opacity: protOpacity, thickness: 0.6};
      s.stick = {colorscheme: INT_CS, radius: 0.18, multipleBondScale: 0.30, singleBonds: false};
      viewer.setStyle({chain: r.chain, resi: r.resi, hetflag: false}, s);
    }
  });

  // Ligand — Kekulé double-bond sticks via SDF model object (or fallback to PDB sticks)
  if (showLigand) {
    if (ligModel) {
      // Explicitly hide the PDB model’s copy of the ligand so it doesn’t overdraw
      viewer.setStyle(
        {resn: LIGAND.resn, chain: LIGAND.chain, resi: LIGAND.resi},
        {}
      );
      // Apply Kekulé double-bond style directly on the model object
      // radius:0.12 + multipleBondScale:0.40 → two cylinders ~0.40 Å apart,
      // clearly visible gap even at modest zoom.
      // singleBonds:false ensures bond orders > 1 render as parallel cylinders.
      ligModel.setStyle({}, {
        stick: {colorscheme: LIG_CS, radius: 0.30, multipleBondScale: 0.20, singleBonds: false},
      });
    } else {
      // Fallback: plain sticks from PDB (no bond-order info)
      viewer.setStyle(
        {resn: LIGAND.resn, chain: LIGAND.chain, resi: LIGAND.resi},
        {
          stick: {colorscheme: LIG_CS, radius: 0.26},
        }
      );
    }
  } else if (ligModel) {
    ligModel.setStyle({}, {});  // hide SDF model when ligand checkbox is off
  }

  // ── Clear all shapes and surfaces ────────────────────────────────────────
  viewer.removeAllShapes();
  viewer.removeAllSurfaces();

  // ── Protein Surface (PyMOL-style) ────────────────────────────────────────
  if (showSurface) {
    viewer.addSurface($3Dmol.SurfaceType.MS, {
      opacity: 1.0,
      color: 'lightblue',
      wireframe: false
    }, {
      hetflag: false  // protein only (exclude HETATM)
    });
  }

  // ── Ligand VDW Surface ───────────────────────────────────────────────────
  if (showLigand && ligModel) {
    viewer.addSurface($3Dmol.SurfaceType.VDW,
      {opacity: 0.14, color: 'white', wireframe: false},
      {model: ligModel}
    );
  }

  // ── Interaction Shapes ───────────────────────────────────────────────────
  INTERACTIONS.forEach(function(inter) {
    if (!enabledT[inter.type]) return;  // skip disabled types
    // Dashed cylinders
    inter.cylinders.forEach(function(c) {
      viewer.addCylinder({
        start:   c.start, end: c.end,
        radius:  c.radius, color: c.color,
        fromCap: 2, toCap: 2,
      });
    });
    // Anchor spheres at contact atom positions
    viewer.addSphere({center: {x:inter.lig_pos[0],y:inter.lig_pos[1],z:inter.lig_pos[2]}, radius:0.15, color:inter.color});
    viewer.addSphere({center: {x:inter.res_pos[0],y:inter.res_pos[1],z:inter.res_pos[2]}, radius:0.15, color:inter.color});
  });

  // ── Labels ───────────────────────────────────────────────────────────────
  // Ligand: bold black label at centroid
  // Interacting residues: bold black labels
  // Nearby residues: smaller black labels (only when showNearby)
  viewer.removeAllLabels();
  if (showLabels) {
    if (false) {  // ligand label removed
      viewer.addLabel(LIGAND.resn + '-' + LIGAND.resi, {
        position:       {x: LIGAND.lx, y: LIGAND.ly, z: LIGAND.lz},
        fontSize:       17,
        fontColor:      'black',
        fontOpacity:    1.0,
        showBackground: false,
        inFront:        true,
        bold:           true,
        font:           'Arial',
      });
    }
    visInter.forEach(function(r) {
      viewer.addLabel(r.resn + '-' + r.resi, {
        position:         {x: r.lx, y: r.ly, z: r.lz},
        fontSize:         16,
        fontColor:        'black',
        fontOpacity:      1.0,
        showBackground:   false,
        inFront:          true,
        bold:             true,
        font:             'Arial',
      });
    });
    if (showNearby) {
      NEARBY.forEach(function(r) {
        viewer.addLabel(r.resn + '-' + r.resi, {
          position:         {x: r.lx, y: r.ly, z: r.lz},
          fontSize:         13,
          fontColor:        'black',
          fontOpacity:      1.0,
          showBackground:   false,
          inFront:          true,
          bold:             false,
          font:             'Arial',
        });
      });
    }
  }

  viewer.render();
}

// ── controls ─────────────────────────────────────────────────────────────────
function resetView() {
  viewer.zoomTo({resn: LIGAND.resn, chain: LIGAND.chain, resi: LIGAND.resi});
  viewer.zoom(0.78);
  viewer.render();
}

function toggleBG() {
  bgBlack = !bgBlack;
  viewer.setBackgroundColor(bgBlack ? 'black' : 'white');
  viewer.render();
}

function downloadPNG() {
  var gl = getGLCanvas();
  if (!gl) { alert('Canvas not ready.'); return; }
  viewer.setBackgroundColor(0x000000, 0);
  viewer.render();
  var SC = 300 / 96;   // ≈ 3.125 — brings screen pixels to 300 DPI
  var out = document.createElement('canvas');
  out.width  = Math.round(gl.width  * SC);
  out.height = Math.round(gl.height * SC);
  var ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(gl, 0, 0, out.width, out.height);
  viewer.setBackgroundColor(bgBlack ? 'black' : 'white');
  viewer.render();
  var a = document.createElement('a');
  a.href = setPNGDPI(out.toDataURL('image/png'), 300);
  a.download = 'PLIP_' + LIGAND.resn + LIGAND.resi + '_' + LIGAND.chain + '_full_300dpi.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function downloadSelection() {
  if (!selRect) { alert('No area selected. Click "Select Area" and drag to crop.'); return; }
  var gl = getGLCanvas();
  if (!gl) { alert('Canvas not ready.'); return; }
  viewer.setBackgroundColor(0x000000, 0);
  viewer.render();
  var SC = 300 / 96;   // ≈ 3.125
  var out = document.createElement('canvas');
  out.width  = Math.round(selRect.w * SC);
  out.height = Math.round(selRect.h * SC);
  var ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(gl,
    selRect.x, selRect.y, selRect.w, selRect.h,
    0, 0, out.width, out.height);
  viewer.setBackgroundColor(bgBlack ? 'black' : 'white');
  viewer.render();
  var a = document.createElement('a');
  a.href = setPNGDPI(out.toDataURL('image/png'), 300);
  a.download = 'PLIP_' + LIGAND.resn + LIGAND.resi + '_' + LIGAND.chain + '_crop_300dpi.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── PNG 300 DPI metadata helper ───────────────────────────────────────────────
// Embeds a pHYs chunk (pixels-per-meter) so image editors report 300 DPI.
var _crcTbl = (function() {
  var t = [];
  for (var n = 0; n < 256; n++) {
    var c = n;
    for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c;
  }
  return t;
})();
function _crc32(buf, off, len) {
  var c = 0xFFFFFFFF;
  for (var i = off; i < off + len; i++) c = _crcTbl[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function setPNGDPI(dataURL, dpi) {
  var b64 = dataURL.split(',')[1];
  var bin = atob(b64);
  var src = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) src[i] = bin.charCodeAt(i);
  var ppm = Math.round(dpi / 0.0254);  // pixels per metre
  // pHYs data: 4B X-ppm + 4B Y-ppm + 1B unit(1=metre) = 9 bytes
  var pd = new Uint8Array(13);          // type(4) + data(9)
  pd[0]=0x70; pd[1]=0x48; pd[2]=0x59; pd[3]=0x73; // 'pHYs'
  pd[4]=(ppm>>24)&0xff; pd[5]=(ppm>>16)&0xff; pd[6]=(ppm>>8)&0xff; pd[7]=ppm&0xff;
  pd[8]=(ppm>>24)&0xff; pd[9]=(ppm>>16)&0xff; pd[10]=(ppm>>8)&0xff; pd[11]=ppm&0xff;
  pd[12]=1;
  var crc = _crc32(pd, 0, 13);
  // Full chunk: 4B length + 4B type + 9B data + 4B CRC = 21 bytes
  var chunk = new Uint8Array(21);
  chunk[0]=0; chunk[1]=0; chunk[2]=0; chunk[3]=9;   // length = 9
  chunk.set(pd, 4);
  chunk[17]=(crc>>24)&0xff; chunk[18]=(crc>>16)&0xff;
  chunk[19]=(crc>>8)&0xff;  chunk[20]=crc&0xff;
  // Insert after PNG sig(8) + IHDR chunk(25) = byte 33
  var ins = 33;
  var out = new Uint8Array(src.length + 21);
  out.set(src.subarray(0, ins));
  out.set(chunk, ins);
  out.set(src.subarray(ins), ins + 21);
  var s = '';
  for (var i = 0; i < out.length; i++) s += String.fromCharCode(out[i]);
  return 'data:image/png;base64,' + btoa(s);
}

// ── sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  // Interaction type legend (only active types)
  var lhtml = '';
  ACTIVE_TYPES.forEach(function(t) {
    lhtml += '<div class="legend-row">'
           + '<div class="ldot" style="background:' + ALL_COLORS[t] + '"></div>'
           + '<span>' + ALL_LABELS[t] + '</span></div>';
  });
  if (!lhtml) lhtml = '<span style="color:rgba(100,150,200,0.6);">None found</span>';
  document.getElementById('legend').innerHTML = lhtml;

  // Summary counts
  var counts = {};
  INTERACTIONS.forEach(function(i) { counts[i.label] = (counts[i.label] || 0) + 1; });
  var shtml = '';
  Object.keys(counts).sort().forEach(function(k) {
    shtml += '<div class="legend-row"><span style="color:#44ccff;">' + k
           + ':</span><span style="color:#e0f0ff;margin-left:auto;">' + counts[k] + '</span></div>';
  });
  shtml += '<div class="legend-row" style="margin-top:5px;border-top:1px solid rgba(80,140,220,0.18);padding-top:5px;">'
         + '<span style="color:rgba(100,160,220,0.7);">BS residues (5Å):</span>'
         + '<span style="color:#e0f0ff;margin-left:auto;">' + (INTERACTING.length + NEARBY.length) + '</span></div>';
  document.getElementById('summary').innerHTML = shtml;

  // Interaction detail cards
  var ihtml = '';
  INTERACTIONS.forEach(function(inter) {
    var tc = (inter.color === '#FFE500') ? '#1a1200' : '#fff';
    ihtml += '<div class="icard">'
           + '<span class="icard-type" style="background:' + inter.color + ';color:' + tc + ';">' + inter.label + '</span>'
           + '<div class="icard-res">' + inter.restype + '-' + inter.resnr + ' (Chain ' + inter.chain + ')</div>'
           + '<div class="icard-dist">Distance: ' + inter.distance + ' Å</div>'
           + '</div>';
  });
  if (!ihtml) ihtml = '<div style="color:rgba(100,150,200,0.5);font-size:12px;">No interactions detected.</div>';
  document.getElementById('ilist').innerHTML = ihtml;
}

window.addEventListener('load', initViewer);
</script>
